<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat LAN Semplice</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    flex-direction: column;
    height: 100vh;
    margin: 0;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    background: #222;
  }
  #chat div {
    margin-bottom: 8px;
    padding: 6px 10px;
    border-radius: 5px;
  }
  #chat .you { background: #0a84ff; color: #fff; text-align: right; }
  #chat .other { background: #444; color: #fff; text-align: left; }
  #inputBox {
    display: flex;
    border-top: 1px solid #333;
  }
  #msg {
    flex: 1;
    padding: 10px;
    border: none;
    font-size: 16px;
    background: #111;
    color: #fff;
  }
  #sendBtn {
    padding: 0 20px;
    border: none;
    background: #0a84ff;
    color: #fff;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="chat"></div>

<div id="inputBox">
  <input type="text" id="msg" placeholder="Scrivi qualcosa..." autocomplete="off"/>
  <button id="sendBtn">Invia</button>
</div>

<script>
  const chat = document.getElementById('chat');
  const msgInput = document.getElementById('msg');
  const sendBtn = document.getElementById('sendBtn');

  // Cambia qui l'indirizzo del server nella tua LAN
  const ws = new WebSocket('ws://192.168.1.71:8080');

  ws.onopen = () => {
    console.log('Connesso al server WebSocket');
  };

  ws.onmessage = (event) => {
    const data = event.data;
    const div = document.createElement('div');
    div.textContent = data;
    div.className = 'other';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  };

  sendBtn.onclick = sendMessage;
  msgInput.addEventListener('keypress', e => { if(e.key === 'Enter') sendMessage(); });

  function sendMessage() {
    const msg = msgInput.value.trim();
    if (!msg) return;
    ws.send(msg);
    const div = document.createElement('div');
    div.textContent = msg;
    div.className = 'you';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    msgInput.value = '';
  }
</script>

</body>
</html>
